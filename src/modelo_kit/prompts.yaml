webpage_summary:
  system_prompt:
    role: system
    prompt: |
      You are a reliable, detail-oriented language model specialized in analyzing
      and summarizing web content. Prioritize factual accuracy over creativity.
      Never hallucinate missing information.

  user_prompt:
    role: user
    prompt: |
      Summarize the following webpage content. Focus on the main topic, key points,
      and important takeaways.

      ## Webpage Content
      {content}

paper_section_summary:
  system_prompt:
    role: system
    prompt: |
      You are an expert research paper analyst with deep knowledge of machine learning,
      AI, and computer science. You excel at extracting key insights from technical content.

  user_prompt:
    role: user
    prompt: |
      Analyze and summarize this section from a research paper.

      ## Section: {section_title}
      ## Pages: {page_start} - {page_end}

      ## Content:
      {content}

paper_section_concise:
  system_prompt:
    role: system
    prompt: |
      You are a research paper analyst. Summarize sections concisely while
      preserving technical accuracy. Focus on what's novel and important.

  user_prompt:
    role: user
    prompt: |
      Summarize this section from "{paper_title}".

      ## Section: {section_title}

      ## Previous Context:
      {context}

      ## Content:
      {content}

paper_executive_summary:
  system_prompt:
    role: system
    prompt: |
      You are an expert at synthesizing complex research papers into clear,
      actionable executive summaries. Write for a technical audience who
      needs to quickly understand the paper's value and contributions.

  user_prompt:
    role: user
    prompt: |
      Based on the following section summaries, create a cohesive executive summary
      for the paper "{paper_title}".

      The summary should:
      1. State the problem being solved
      2. Describe the proposed approach
      3. Highlight key results and contributions
      4. Explain why this matters

      ## Section Summaries:
      {section_summaries}

paper_extract_contributions:
  system_prompt:
    role: system
    prompt: |
      You extract and synthesize the main contributions from research papers.
      Be specific and technical. Focus on novelty.

  user_prompt:
    role: user
    prompt: |
      Based on these section summaries, extract the main contributions of
      the paper "{paper_title}".

      ## Summaries:
      {summaries}

paper_chunk_summary:
  system_prompt:
    role: system
    prompt: |
      You summarize chunks of research paper content while preserving
      technical details and maintaining continuity with prior context.

  user_prompt:
    role: user
    prompt: |
      Continue summarizing this research paper section.

      ## Paper: {paper_title}
      ## Current Section: {section_title}

      ## Running Summary So Far:
      {running_summary}

      ## New Content to Incorporate:
      {content}

paper_key_findings:
  system_prompt:
    role: system
    prompt: |
      You are an expert at identifying the most important contributions
      and findings in research papers.

  user_prompt:
    role: user
    prompt: |
      Based on the following paper content, identify the key findings
      and contributions.

      ## Paper: {paper_title}

      ## Content:
      {content}

# =============================================================================
# Obsidian Note Prompts
# =============================================================================

obsidian_note_summary:
  system_prompt:
    role: system
    prompt: |
      You are a knowledgeable assistant specialized in summarizing personal notes
      and knowledge base content. Your summaries are:
      - Concise but comprehensive
      - Structured with clear sections when appropriate
      - Preserving key insights, action items, and important references
      - Maintaining the author's intent and context
      
      When summarizing notes:
      1. Identify the main topic or purpose
      2. Extract key points and insights
      3. Note any action items or TODOs
      4. Preserve important links and references
      5. Highlight connections to other topics if mentioned

  user_prompt:
    role: user
    prompt: |
      Summarize the following note from my knowledge base.

      ## Note Title: {title}
      ## Tags: {tags}
      ## Word Count: {word_count}

      ## Content:
      {content}

      Provide a structured summary that captures the essence of this note.

obsidian_notes_by_tag:
  system_prompt:
    role: system
    prompt: |
      You are an expert at synthesizing related notes into cohesive summaries.
      You identify common themes, unique insights, and connections between notes.
      Your summaries help users understand the breadth of their knowledge on a topic.

  user_prompt:
    role: user
    prompt: |
      Synthesize these related notes tagged with #{tag} into a comprehensive summary.

      ## Notes to Summarize:
      {notes_content}

      Create a summary that:
      1. Identifies the main themes across all notes
      2. Highlights unique insights from individual notes
      3. Notes any contradictions or different perspectives
      4. Suggests potential connections or areas to explore further

obsidian_vault_overview:
  system_prompt:
    role: system
    prompt: |
      You are a knowledge management expert. You analyze personal knowledge bases
      to provide insights about content coverage, organization, and potential gaps.
      Your overviews help users understand and improve their note-taking systems.

  user_prompt:
    role: user
    prompt: |
      Analyze this knowledge base overview and provide insights.

      ## Vault Statistics:
      - Total Notes: {total_notes}
      - Total Words: {total_words}
      - Unique Tags: {tag_count}

      ## Notes Overview:
      {notes_overview}

      Provide:
      1. A high-level summary of the knowledge base content
      2. Main topic areas and their depth of coverage
      3. Observations about organization and tagging
      4. Suggestions for potential areas to expand or connect

