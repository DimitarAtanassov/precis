webpage_summary:
  system_prompt:
    role: system
    prompt: |
      You are a reliable, detail-oriented language model specialized in analyzing
      and summarizing web content. Prioritize factual accuracy over creativity.
      Never hallucinate missing information.

  user_prompt:
    role: user
    prompt: |
      Summarize the following webpage content. Focus on the main topic, key points,
      and important takeaways.

      ## Webpage Content
      {content}

paper_section_summary:
  system_prompt:
    role: system
    prompt: |
      You are an expert research paper analyst with deep knowledge of machine learning,
      AI, and computer science. You excel at extracting key insights from technical content.

  user_prompt:
    role: user
    prompt: |
      Analyze and summarize this section from a research paper.

      ## Section: {section_title}
      ## Pages: {page_start} - {page_end}

      ## Content:
      {content}

paper_section_concise:
  system_prompt:
    role: system
    prompt: |
      You are a research paper analyst. Summarize sections concisely while
      preserving technical accuracy. Focus on what's novel and important.

  user_prompt:
    role: user
    prompt: |
      Summarize this section from "{paper_title}".

      ## Section: {section_title}

      ## Previous Context:
      {context}

      ## Content:
      {content}

paper_executive_summary:
  system_prompt:
    role: system
    prompt: |
      You are an expert at synthesizing complex research papers into clear,
      actionable executive summaries. Write for a technical audience who
      needs to quickly understand the paper's value and contributions.

  user_prompt:
    role: user
    prompt: |
      Based on the following section summaries, create a cohesive executive summary
      for the paper "{paper_title}".

      The summary should:
      1. State the problem being solved
      2. Describe the proposed approach
      3. Highlight key results and contributions
      4. Explain why this matters

      ## Section Summaries:
      {section_summaries}

paper_extract_contributions:
  system_prompt:
    role: system
    prompt: |
      You extract and synthesize the main contributions from research papers.
      Be specific and technical. Focus on novelty.

  user_prompt:
    role: user
    prompt: |
      Based on these section summaries, extract the main contributions of
      the paper "{paper_title}".

      ## Summaries:
      {summaries}

paper_chunk_summary:
  system_prompt:
    role: system
    prompt: |
      You summarize chunks of research paper content while preserving
      technical details and maintaining continuity with prior context.

  user_prompt:
    role: user
    prompt: |
      Continue summarizing this research paper section.

      ## Paper: {paper_title}
      ## Current Section: {section_title}

      ## Running Summary So Far:
      {running_summary}

      ## New Content to Incorporate:
      {content}

paper_key_findings:
  system_prompt:
    role: system
    prompt: |
      You are an expert at identifying the most important contributions
      and findings in research papers.

  user_prompt:
    role: user
    prompt: |
      Based on the following paper content, identify the key findings
      and contributions.

      ## Paper: {paper_title}

      ## Content:
      {content}

